name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    name: Test (${{ matrix.os }} / node-${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Sprint 6 W3.8 — expand cross-platform smoke matrix to 5 OS × 2 Node
      # versions = 10 jobs. fail-fast=false so a single OS/runtime regression
      # doesn't mask state on the others. The matrix was 3 OS × 1 implicit
      # Node before this expansion (Sprint 5).
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
          - macos-13
          - macos-14
          - windows-2022
        node:
          - "20"
          - "22"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        # Sprint 6: Node 20 and 22 LTS — both supported by Bun's `--target node`
        # bundler. Node 18 dropped 2026-04 per upstream EOL.
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Pinned to 1.3.13 — `latest` (1.4.x) regresses fs.promises.appendFile
          # ordering, surfacing as ENOENT in EventLedger Phase 4 chain tests
          # immediately after `await ledger.log()` returns. Roll forward only
          # after a targeted fix lands.
          bun-version: "1.3.13"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build CLI bundle
        # Required by `tests/build.test.ts` and `tests/install-and-run.test.ts`
        # which assert dist/cli.js exists and is invokable.
        run: bun run build

      - name: Run tests
        env:
          # Skip docker-driven integration legs on runners without docker.
          # macOS / windows runners do not ship a docker daemon by default.
          APOHARA_SKIP_DOCKER_E2E: "1"
        # Exclude packages/tui — vitest+Ink prototype to be archived in M017.9
        # (ROADMAP v2.0); its .test.tsx files need react/jsx-dev-runtime which
        # bun's runner cannot resolve from the nested workspace.
        run: bun test src tests

      - name: Lint code
        # Lint is a single-OS check — pinned to the newest ubuntu so cross-OS
        # path differences don't churn the lint output. Other matrix jobs
        # still build + test, just skip the lint pass.
        if: matrix.os == 'ubuntu-24.04' && matrix.node == '22'
        run: bunx biome format --write

      - name: Bundle size guard (G7.D.4)
        # Only enforces the npx-cli budget at the test stage. The
        # desktop binary guard runs inside `desktop-release.yml`
        # because the matrix here doesn't cross-compile Rust.
        if: matrix.os == 'ubuntu-24.04' && matrix.node == '22'
        run: |
          (cd npx-cli && bun run build)
          bash scripts/check-bundle-size.sh

      - name: Smoke benchmarks (G7.D.5)
        # Single-OS canary — the budgets are tuned for the GitHub
        # `ubuntu-24.04` runner. Cross-OS clock skew on macos/windows
        # makes wall-clock budgets unreliable there.
        if: matrix.os == 'ubuntu-24.04' && matrix.node == '22'
        run: bun test tests/benchmarks

  # G7.D.2 — cargo-audit gate. Runs on every PR; fails on any
  # advisory (`--deny warnings`). Pinned to ubuntu-22.04 because
  # cargo-audit's binary install is fastest on Linux runners.
  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + cargo-audit binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-audit
            ~/.cargo/registry
            ~/.cargo/advisory-db
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-audit-${{ runner.os }}-

      - name: Install cargo-audit
        # `--locked` keeps the audit tool deterministic across runs;
        # `|| true` makes the install idempotent when the cache hit
        # already restored the binary.
        run: |
          if ! command -v cargo-audit >/dev/null; then
            cargo install cargo-audit --locked
          fi

      - name: Run cargo audit
        # `--deny warnings` blocks merge on any RUSTSEC advisory,
        # including unmaintained / yanked. Tighten the noose further
        # if needed via `--ignore RUSTSEC-yyyy-nnnn` in a follow-up.
        run: cargo audit --deny warnings

  # G7.D.3 — license + duplicate + source scan via cargo-deny.
  # Independent of cargo-audit so a single noisy advisory doesn't
  # mask a license regression.
  license-scan:
    name: license-scan (cargo-deny)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-deny binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-deny
            ~/.cargo/registry
          key: cargo-deny-${{ runner.os }}-${{ hashFiles('deny.toml') }}
          restore-keys: |
            cargo-deny-${{ runner.os }}-

      - name: Install cargo-deny
        run: |
          if ! command -v cargo-deny >/dev/null; then
            cargo install cargo-deny --locked
          fi

      - name: Run cargo deny check (licenses + bans + sources + advisories)
        # `check` runs every section in `deny.toml`. The license
        # allowlist is the contract; new transitive licenses fail
        # here BEFORE they ship.
        run: cargo deny check

  # G7.D.6 — npx tarball E2E. Verifies `npm pack` → install →
  # `--version` works end-to-end on a freshly built shim. The
  # in-repo bun test does the same but on a clean ubuntu runner
  # (no Bun-only quirks).
  npx-tarball-e2e:
    name: npx-tarball-e2e
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Run npx tarball E2E
        # The test handles `npm pack` + install + `--version` on its
        # own; this step just runs it.
        run: bun test tests/e2e/npx-from-tarball.test.ts

  # G10.A.1 — Cross-platform smoke (3×2 matrix). Builds on Sprint 7
  # G7.E.4 which covered the three OS families on Node 22 only.
  # Catalyst's release contract is "Node >=20", so we now exercise
  # both LTS lines (20 + 22) end-to-end on Linux / macOS / Windows:
  # build shim → `npm pack` → `npm install -g` → `apohara doctor`
  # → `apohara --version`. A regression on Node 20 that doesn't
  # surface on Node 22 (or vice versa) used to ship silently — this
  # matrix catches it pre-publish. macos-13 (Intel) dropped here
  # because GitHub deprecates it Dec 2025; Apple-Silicon-only
  # (`macos-14`) is the supported macOS surface from Sprint 10
  # onwards. WSL2 coverage is tracked manually in the G10.A.2
  # runbook (no native WSL runner exists on github.com hosted yet).
  cross-platform-smoke:
    name: cross-platform-smoke (${{ matrix.os }} / node ${{ matrix.node }})
    runs-on: ${{ matrix.os }}
    strategy:
      # fail-fast=false: we want signal from EVERY cell, not just
      # the first one to break. A Windows / Node-20 regression that
      # hides because Linux / Node-22 failed first wastes a re-run
      # cycle and masks platform-specific bugs.
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-2022]
        node: ['20', '22']
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Install root dependencies
        run: bun install --frozen-lockfile

      - name: Build npx shim
        # `npx-cli/src/cli.ts` → `dist/cli.js` via `bun build`. The
        # shim is the entry point for `npx @apohara/catalyst@latest`,
        # so a build break here ships broken installs. We need this
        # to run BEFORE `npm pack` because `package.json` declares
        # `"files": ["dist", "README.md"]` — without dist, the
        # tarball is empty. `working-directory` is the GHA-native
        # cross-OS way (works on Windows where PowerShell subshell
        # syntax breaks bash idioms).
        working-directory: npx-cli
        run: bun run build

      - name: Install package as user would
        # `npm pack` produces `apohara-catalyst-<version>.tgz`
        # (scoped name `@apohara/catalyst` flattens to that prefix).
        # Installing globally puts `apohara` on PATH via the `bin`
        # mapping in package.json. `shell: bash` because the cd +
        # glob expansion needs POSIX semantics (Windows runners
        # default to PowerShell, which mangles `./apohara-catalyst-*.tgz`).
        run: |
          cd npx-cli
          npm pack
          npm install -g ./apohara-catalyst-*.tgz
        shell: bash

      - name: apohara doctor (must exit 0 or 2)
        # `doctor` returns 0 (all green) or 2 (warnings, e.g. no
        # provider CLIs installed on the runner — expected here). 1
        # would be a real failure (crash, unreadable config, etc.).
        # `|| [ $? -eq 2 ]` accepts both green-paths. `shell: bash`
        # for the `$?` idiom.
        run: apohara doctor || [ $? -eq 2 ]
        shell: bash

      - name: apohara --version
        # `--version` short-circuits before any binary resolution
        # (no download, no PATH lookup beyond the global install) —
        # asserts the package's own version string surfaces.
        run: apohara --version

      - name: Upload doctor report
        # `~/.apohara/doctor-report.json` is the structured artifact
        # `apohara doctor` writes regardless of exit code. Uploading
        # under a per-cell name keeps the 6 reports distinguishable
        # in the run summary. `if-no-files-found: warn` because some
        # very-early failures may not reach the report-write step.
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: doctor-${{ matrix.os }}-node${{ matrix.node }}
          path: ~/.apohara/doctor-report.json
          if-no-files-found: warn
