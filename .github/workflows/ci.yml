name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  # Live Rust workspace gate. Runs on every PR: builds, tests, and lints the
  # entire Cargo workspace. This is the regression guard for the Rust-native
  # codebase — it replaces the dead bun/TS jobs (test/npx-tarball-e2e/
  # cross-platform-smoke) that exercised deleted `src/`/`tests/`/`npx-cli/`
  # artifacts and failed at `bun install` step 1. clippy runs with
  # `-D warnings` so any lint regression blocks merge.
  workspace:
    name: workspace (build + test + clippy)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: workspace-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            workspace-${{ runner.os }}-

      - name: cargo build --workspace
        run: cargo build --workspace

      - name: cargo test --workspace
        run: cargo test --workspace

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

  # G7.D.2 — cargo-audit gate. Runs on every PR; fails on any
  # advisory (`--deny warnings`). Pinned to ubuntu-22.04 because
  # cargo-audit's binary install is fastest on Linux runners.
  cargo-audit:
    name: cargo-audit
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + cargo-audit binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-audit
            ~/.cargo/registry
            ~/.cargo/advisory-db
          key: cargo-audit-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            cargo-audit-${{ runner.os }}-

      - name: Install cargo-audit
        # `--locked` keeps the audit tool deterministic across runs;
        # `|| true` makes the install idempotent when the cache hit
        # already restored the binary.
        run: |
          if ! command -v cargo-audit >/dev/null; then
            cargo install cargo-audit --locked
          fi

      - name: Run cargo audit
        # `--deny warnings` blocks merge on any RUSTSEC advisory,
        # including unmaintained / yanked. Tighten the noose further
        # if needed via `--ignore RUSTSEC-yyyy-nnnn` in a follow-up.
        run: cargo audit --deny warnings

  # G7.D.3 — license + duplicate + source scan via cargo-deny.
  # Independent of cargo-audit so a single noisy advisory doesn't
  # mask a license regression.
  license-scan:
    name: license-scan (cargo-deny)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-deny binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-deny
            ~/.cargo/registry
          key: cargo-deny-${{ runner.os }}-${{ hashFiles('deny.toml') }}
          restore-keys: |
            cargo-deny-${{ runner.os }}-

      - name: Install cargo-deny
        run: |
          if ! command -v cargo-deny >/dev/null; then
            cargo install cargo-deny --locked
          fi

      - name: Run cargo deny check (licenses + bans + sources + advisories)
        # `check` runs every section in `deny.toml`. The license
        # allowlist is the contract; new transitive licenses fail
        # here BEFORE they ship.
        run: cargo deny check

  # G3.C.3 — INV-bash-scope proof gate. The plan asked for a Z3 SMT
  # proof job; we ship the proptest-exhaustion equivalent because the
  # current build hosts (CachyOS dev, ubuntu-22.04 CI) have no libz3
  # installed and bundling Z3 from source bloats the CI cache by
  # ~120 MB and adds ~5 min per run. The exhaustion proof is
  # mechanically equivalent in scope (see
  # crates/apohara-safety/src/inv_bash_scope.rs for the trade-off
  # write-up). When libz3 becomes installable on the runner, swap
  # this job's body for the SMT solver invocation without changing
  # the gate semantics.
  inv-bash-scope-proof:
    name: inv-bash-scope-proof
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: inv-bash-scope-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            inv-bash-scope-${{ runner.os }}-

      - name: Run INV-bash-scope proptest exhaustion proof
        # Release profile makes the 1024 generated cases per proptest
        # finish in ~0.2s instead of ~2s; matters because this job
        # blocks merge so the wall-clock latency is visible.
        run: cargo test -p apohara-safety inv_bash_scope --release

      - name: Run verification-mesh INV-bash-scope gate integration test
        # The gate wires INV-bash-scope into the run_all_gates pipeline;
        # this job pins the integration so an accidental gate removal
        # surfaces immediately (instead of next time a critic run
        # exercises the affected code path).
        run: cargo test -p apohara-verification --test inv_bash_scope_gate --release
