name: Desktop Release Build

# Phase 6.1 — cross-OS Tauri build matrix. Fires on:
#   - tag pushes (v*.*.*)  : full release artifacts uploaded to the GH release
#   - manual dispatch       : ad-hoc builds for testing
#   - PRs touching desktop  : smoke-build only (no upload) so regressions
#                             in packaging surface before merge.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
  pull_request:
    paths:
      - "packages/desktop/**"
      - ".github/workflows/desktop-release.yml"
      - "Cargo.toml"
      - "Cargo.lock"

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.os-name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            os-name: darwin-x64
            artifact-glob: |
              target/release/apohara-desktop
              target/release/bundle/dmg/*.dmg
              target/release/bundle/macos/*.app
            system-deps: ""
          - runner: macos-14
            os-name: darwin-arm64
            artifact-glob: |
              target/release/apohara-desktop
              target/release/bundle/dmg/*.dmg
              target/release/bundle/macos/*.app
            system-deps: ""
          - runner: ubuntu-22.04
            os-name: linux-x64
            artifact-glob: |
              target/release/apohara-desktop
              target/release/bundle/deb/*.deb
              target/release/bundle/appimage/*.AppImage
            system-deps: |
              sudo apt-get update
              sudo apt-get install -y \
                libwebkit2gtk-4.1-dev \
                libsoup-3.0-dev \
                librsvg2-dev \
                libgtk-3-dev \
                libayatana-appindicator3-dev
          - runner: windows-2022
            os-name: win-x64
            artifact-glob: |
              target/release/apohara-desktop.exe
              target/release/bundle/msi/*.msi
              target/release/bundle/nsis/*.exe
            system-deps: ""

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          # Same pin as CI — see .github/workflows/ci.yml for the
          # bun-1.4.x appendFile regression note.
          bun-version: "1.3.13"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"
          key: ${{ matrix.os-name }}-tauri

      - name: Cache bun artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun
            packages/desktop/node_modules/.cache
          key: ${{ matrix.os-name }}-bun-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            ${{ matrix.os-name }}-bun-

      - name: Install system deps (${{ matrix.os-name }})
        if: matrix.system-deps != ''
        run: ${{ matrix.system-deps }}

      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build React frontend bundle
        working-directory: packages/desktop
        run: bun run build

      - name: Build Tauri desktop app
        working-directory: packages/desktop
        # `bun run tauri:build` defers to the @tauri-apps/cli runner that
        # uses the local Cargo workspace member added in M017.8.
        run: bun run tauri:build

      - name: Inspect artifact sizes
        if: runner.os != 'Windows'
        run: |
          echo "--- target/release ---"
          ls -lh target/release/apohara-desktop || true
          echo "--- bundles ---"
          find target/release/bundle -maxdepth 3 -type f \( -name "*.deb" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.app" -o -name "*.msi" -o -name "*.exe" \) -exec ls -lh {} +

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apohara-desktop-${{ matrix.os-name }}
          path: ${{ matrix.artifact-glob }}
          if-no-files-found: warn

      # Release attachment only fires on tag pushes (`v*`).
      - name: Attach to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact-glob }}
          fail_on_unmatched_files: false
