[package]
name = "apohara-desktop"
version = "0.0.1-alpha"
description = "Apohara visual vibecoding orchestrator desktop shell"
authors = ["Apohara contributors"]
license = "MIT"
edition = "2021"

[lib]
name = "apohara_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tracing = "0.1"
apohara-dispatch = { path = "../../../crates/apohara-dispatch", features = ["tauri"] }
apohara-verification = { path = "../../../crates/apohara-verification", features = ["tauri"] }
apohara-safety = { path = "../../../crates/apohara-safety", features = ["tauri"] }
apohara-spec = { path = "../../../crates/apohara-spec", features = ["tauri"] }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
