# E2E fixture: 3 lightweight worker containers that each emit a
# HandshakeRequest JSON line. The test (tests/integration/
# ssh-workers-docker-compose.test.ts) collects each container's stdout
# and feeds it to the host-side handshake_oracle bin to verify the full
# JSON-over-line protocol works across a process boundary.
#
# The containers do NOT actually open SSH connections; that would require
# bundling the full daemon binary, which lands in G6.A. The contract this
# fixture pins is: "the same wire format the SSH channel will carry is
# accepted by the protocol parser in a containerised environment with no
# Rust toolchain present."

services:
  worker-1:
    image: alpine:3.21
    container_name: apohara-worker-1
    command:
      - sh
      - -c
      - |
        echo '{"apohara_version":"1.0.0-dev","supported_protocols":["apohara-worker/1"],"max_concurrent_tasks":1}'

  worker-2:
    image: alpine:3.21
    container_name: apohara-worker-2
    command:
      - sh
      - -c
      - |
        echo '{"apohara_version":"1.0.0-dev","supported_protocols":["apohara-worker/1"],"max_concurrent_tasks":2}'

  worker-3:
    image: alpine:3.21
    container_name: apohara-worker-3
    command:
      - sh
      - -c
      - |
        echo '{"apohara_version":"1.0.0-dev","supported_protocols":["apohara-worker/1"],"max_concurrent_tasks":4}'
